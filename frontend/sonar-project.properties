# SonarCloud connection
sonar.host.url=https://sonarcloud.io
sonar.organization=akirtidev
sonar.projectKey=admin-panel-old-frontend
sonar.projectName=EasyLife Admin Panel - Frontend

# Source configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Test configuration
sonar.tests=src/__test__
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# Exclusions (not source code)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

# Coverage exclusions (exclude test files from coverage analysis)
sonar.coverage.exclusions=src/__test__/**

# JavaScript coverage (generated by jest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality gate
sonar.qualitygate.wait=true
