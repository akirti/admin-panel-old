<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyLife Admin Panel</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('easylife-theme');
          if (theme && ['original','dark','ocean','forest','sunset','lavender'].includes(theme)) {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch(e) {}
      })();
    </script>
    <script src="env-config.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
