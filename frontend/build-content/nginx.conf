worker_processes 1;
daemon off;
 
error_log stderr;
events { worker_connections 1024; }
 
http {
  charset utf-8;
  log_format cloudfoundry '$http_x_forwarded_for - $http_referer - [$time_local] "$request" $status $body_bytes_sent';
  access_log /dev/stdout cloudfoundry;
  #access_log /home/vcap/app/nginx/logs/access.log cloudfoundry;
  default_type application/octet-stream;
  include mime.types;
  include nginx/conf/includes/headers.conf;
  sendfile on;
 
  gzip on;
  gzip_disable "msie6";
  gzip_comp_level 6;
  gzip_min_length 1100;
  gzip_buffers 16 8k;
  gzip_proxied any;
  gunzip on;
  gzip_static always;
  gzip_types text/plain text/css text/js text/xml text/javascript application/javascript application/x-javascript application/json application/xml application/xml+rss;
  gzip_vary on;
 
  tcp_nopush on;
  keepalive_timeout 30;
  port_in_redirect off; # Ensure that redirects don't include the internal container PORT - 8080
  server_tokens off;
 
  server {
    listen {{port}};
    server_name localhost;
 
    root /home/vcap/app/public;
    #root public;
    add_header CUSTOM-NGINX-CONF true always;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
 
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    set $updated_host $host;
    if ($http_x_forwarded_host != "") {
      set $updated_host $http_x_forwarded_host;
    }
 
    if ($http_x_forwarded_proto != "https") {
      return 301 https://$updated_host$request_uri;
    }
 
    location ~* \.(?:html?)$ {
        #add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
        add_header Last-Modified $date_gmt;
        add_header Cache-Control 'no-store, no-cache';
        if_modified_since off;
        expires off;
        etag off;
    }
 
    location / {
      if (!-e $request_filename) {
        rewrite ^(.*)$ / break;
      }

      try_files $uri $uri/ /index.html;

      # NOTE: Do NOT add CORS headers here for static assets.
      # API calls go directly to Apigee (cross-origin) which handles CORS.
      # Adding Access-Control-Allow-Origin: * here conflicts with Apigee's
      # credential-based CORS (Allow-Credentials: true + wildcard origin is
      # rejected by browsers per the CORS spec).
    }
 
    location /echo {
       return 200 "$scheme://$host$request_uri";
    }
 
    location /test {
      default_type application/json;
 
      set $override "{{env "MANIFEST_VARIABLE"}}";
 
      if ($override != '') {
          return 200 "{{env "MANIFEST_VARIABLE"}}";
      }
 
      return 200 "No overrides happening! \"abc\"";
    }
 
    location /env.js {
      expires -1;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
      add_header 'Cache-Control' 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
      try_files /env{{env "ENV"}}.js $uri =404;
    }
 
    location ~ /\. {
      deny all;
      return 404;
    }
  }
}
 
