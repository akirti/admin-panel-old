# SonarCloud connection
sonar.host.url=https://sonarcloud.io
sonar.organization=akirtidev
sonar.projectKey=admin-panel-old
sonar.projectName=EasyLife Admin Panel

# Source configuration
sonar.sources=backend/src
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Test configuration
sonar.tests=backend/tests
sonar.test.inclusions=**/test_*.py

# Exclusions (not source code)
sonar.exclusions=**/node_modules/**,**/dist/**,**/.git/**,**/venv/**,**/htmlcov/**,**/__pycache__/**,frontend/build/**

# Python coverage (generated by pytest-cov --cov-report=xml)
sonar.python.coverage.reportPaths=backend/coverage.xml

# Quality gate
sonar.qualitygate.wait=true
